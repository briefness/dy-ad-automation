# 批量生成配置示例
# 运行方式：python batch.py --config examples/sample_batch.yaml

# ============================================================
# 全局默认值（可被单个任务覆盖）
# ============================================================
default_style: "kubrick"
default_duration: 8
default_mode: "pro"
default_aspect_ratio: "9:16"

# ============================================================
# 批量执行配置
# ============================================================
concurrent: 1          # 并发数，建议 1-2，避免触发 API 限流
fail_fast: true        # true：任一任务失败立即终止；false：继续执行剩余任务
output_dir: "output/batch_example"

# ============================================================
# 任务列表
# ============================================================
tasks:
  # 示例 1：美妆产品 + 希区柯克风格
  - product_name: "水润保湿面霜"
    product_type: "美妆"
    selling_point: "24小时深层保湿，肌肤水润透亮"
    audience: "25-40岁女性"
    style: "hitchcock"
    character_age: "28"
    character_gender: "女"
    outfit: "白色简约家居服"

  # 示例 2：科技产品 + 库布里克风格
  - product_name: "智能降噪耳机"
    product_type: "科技"
    selling_point: "40dB深度降噪，沉浸式音乐体验"
    audience: "18-35岁男性"
    style: "kubrick"
    character_age: "26"
    character_gender: "男"
    outfit: "深色科技感卫衣"

  # 示例 3：汽车产品 + 诺兰风格
  - product_name: "豪华SUV"
    product_type: "汽车"
    selling_point: "强劲动力，尊享舒适"
    audience: "30-50岁商务人士"
    style: "nolan"
    character_age: "35"
    character_gender: "男"
    outfit: "商务休闲西装"

  # 示例 4：教育产品 + 斯皮尔伯格风格
  - product_name: "在线英语课"
    product_type: "教育"
    selling_point: "母语外教，沉浸式学习"
    audience: "6-12岁儿童家长"
    style: "spielberg"
    character_age: "30"
    character_gender: "女"
    outfit: "时尚职业装"

  # 示例 5：医疗产品 + 安德森风格
  - product_name: "智能血压计"
    product_type: "医疗"
    selling_point: "精准测量，健康管家"
    audience: "45-65岁中老年人"
    style: "anderson"
    character_age: "55"
    character_gender: "女"
    outfit: "舒适居家服"
